<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cograph.dev</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .text {
            font-size: 4rem;
            font-weight: bold;
            letter-spacing: 4px;
            white-space: nowrap;
        }
        .char {
            display: inline-block;
            opacity: 0;
            animation: blink 0.3s ease forwards;
            animation-delay: calc(var(--i) * 0.2s);
        }
        @keyframes blink {
            0%, 75% {
                opacity: 0;
            }
            76%, 100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text" id="text"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const text = 'cograph.dev';
            const textElement = document.getElementById('text');
            
            // Create each character with animation delay
            for (let i = 0; i < text.length; i++) {
                const charElement = document.createElement('span');
                charElement.textContent = text[i];
                charElement.classList.add('char');
                charElement.style.setProperty('--i', i + 1);
                textElement.appendChild(charElement);
            }
        });
    </script>
</body>
</html>
